<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Registros</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body class="bg-dark text-light p-4">
  <div class="container">
    <!-- Contenido protegido -->
    <div id="contenidoProtegido" style="display: none;">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-0">Consulta de Registros</h2>
          <small class="text-secondary" id="totalRegistros"></small>
        </div>
        <button class="btn btn-outline-danger btn-sm" onclick="cerrarSesion()">Cerrar sesión</button>
      </div>

      <div class="row mb-3 g-2">
        <div class="col-md-6">
          <input type="text" id="busqueda" class="form-control bg-secondary text-light border-0" placeholder="Buscar por nombre o apellido">
        </div>
        <div class="col-md-3">
          <input type="number" id="busquedaEdad" class="form-control bg-secondary text-light border-0" placeholder="Filtrar por edad">
        </div>
        <div class="col-md-3">
          <select id="busquedaTanda" class="form-select bg-secondary text-light border-0">
            <option value="">Todas las tandas</option>
            <option value="Primera">Primera</option>
            <option value="Segunda">Segunda</option>
          </select>
        </div>
      </div>

      <div class="table-responsive">
        <table class="table table-striped table-bordered table-dark align-middle">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Apellido</th>
              <th>Edad</th>
              <th>Responsable</th>
              <th>Tanda</th>
              <th>Brazalete</th>
              <th>Registrado por</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="contenidoTabla"></tbody>
        </table>
      </div>

      <div class="row mt-3 g-2">
        <div class="col-md-3">
          <a href="index_registro.html" class="btn btn-outline-light w-100">+ Nuevo Registro</a>
        </div>
        <div class="col-md-3">
          <a href="estadisticas-edad.html" class="btn btn-outline-light w-100">Estadísticas</a>
        </div>
        <div class="col-md-3">
          <a href="historial.html" class="btn btn-outline-light w-100">Historial</a>
        </div>
        <div class="col-md-3">
          <button class="btn btn-outline-warning w-100" onclick="respaldarTodo()">Respaldar Todo</button>
        </div>
      </div>
    </div>

    <!-- Sin sesión -->
    <div id="contenidoRestringido" style="display: none;">
      <div class="alert alert-danger mt-4">Contenido protegido. Debes iniciar sesión.</div>
      <a href="login.html" class="btn btn-primary">Ir al Login</a>
    </div>
  </div>

  <script>
    function cerrarSesion() {
      auth.signOut().then(() => window.location.href = "login.html");
    }

    function respaldarTodo() {
      db.collection("niños").get().then(snapshot => {
        const promesas = [];
        snapshot.forEach(doc => {
          promesas.push(db.collection("respaldo_niños").add({
            ...doc.data(),
            originalId: doc.id,
            copiadoEn: firebase.firestore.Timestamp.now()
          }));
        });
        return Promise.all(promesas);
      })
      .then(() => alert("Respaldo completo realizado."))
      .catch(err => alert("Error al respaldar: " + err.message));
    }

    auth.onAuthStateChanged(function(user) {
      const protegido = document.getElementById("contenidoProtegido");
      const restringido = document.getElementById("contenidoRestringido");

      if (user) {
        protegido.style.display = "block";
        restringido.style.display = "none";
        iniciarTabla();
      } else {
        protegido.style.display = "none";
        restringido.style.display = "block";
      }
    });

    function iniciarTabla() {
      const inputNombre = document.getElementById("busqueda");
      const inputEdad = document.getElementById("busquedaEdad");
      const inputTanda = document.getElementById("busquedaTanda");

      const cargar = () => {
        const texto = inputNombre.value.toLowerCase().trim();
        const edadFiltro = inputEdad.value.trim();
        const tandaFiltro = inputTanda.value;
        const tabla = document.getElementById("contenidoTabla");
        const totalEl = document.getElementById("totalRegistros");

        tabla.innerHTML = "<tr><td colspan='8' class='text-center'>Cargando...</td></tr>";

        db.collection("niños").get().then(snapshot => {
          tabla.innerHTML = "";
          let count = 0;

          snapshot.forEach(doc => {
            const d = doc.data();
            const nombreCompleto = `${d.Nombre || ""} ${d.Apellido || ""}`.toLowerCase();
            const coincideNombre = !texto || nombreCompleto.includes(texto);
            const coincideEdad = !edadFiltro || d.Edad == edadFiltro;
            const coincideTanda = !tandaFiltro || d.Tanda === tandaFiltro;

            if (coincideNombre && coincideEdad && coincideTanda) {
              count++;
              const fila = document.createElement("tr");
              fila.innerHTML = `
                <td>${d.Nombre || "-"}</td>
                <td>${d.Apellido || "-"}</td>
                <td>${d.Edad || "-"}</td>
                <td>${d["Quién lo trajo"] || "-"}</td>
                <td>${d.Tanda || "-"}</td>
                <td>
                  <span class="badge ${d["Tiene brazalete"] === "Sí" ? "bg-success" : "bg-secondary"}">
                    ${d["Tiene brazalete"] || "-"}
                  </span>
                </td>
                <td><small class="text-secondary">${d.registradoPor || "-"}</small></td>
                <td>
                  <button class="btn btn-sm btn-warning me-1" onclick="editarRegistro('${doc.id}')">Editar</button>
                  <button class="btn btn-sm btn-danger" onclick="eliminarRegistro('${doc.id}')">Eliminar</button>
                </td>
              `;
              tabla.appendChild(fila);
            }
          });

          if (count === 0) {
            tabla.innerHTML = "<tr><td colspan='8' class='text-center text-secondary'>No se encontraron registros.</td></tr>";
          }
          totalEl.textContent = `${count} registro(s) mostrado(s)`;
        });
      };

      inputNombre.addEventListener("input", cargar);
      inputEdad.addEventListener("input", cargar);
      inputTanda.addEventListener("change", cargar);
      cargar();
    }

    function eliminarRegistro(id) {
      if (confirm("¿Seguro que quieres eliminar este registro?")) {
        db.collection("niños").doc(id).delete()
          .then(() => {
            iniciarTabla();
          })
          .catch(err => alert("No se pudo eliminar: " + err.message));
      }
    }

    function editarRegistro(id) {
      localStorage.setItem("registroEditarId", id);
      window.location.href = "editar.html";
    }
  </script>
</body>
</html>
