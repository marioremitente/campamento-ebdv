<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="imagenes-fondo.css">

  <title>Registro de Ninos</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="firebase-init.js"></script>
</head>

<body class="bg-dark text-light p-4">

  <div class="container" style="max-width:700px;">

    <h2 class="mb-1">
      Registro de Ninos
    </h2>

    <p class="text-secondary mb-3">
      Campamento EBDV —
      <span id="anioActual"></span>
    </p>

    <!-- ESTADO DE CUPOS -->
    <div
      id="estadoCupos"
      class="alert alert-info">

      Cargando cupos...

    </div>

    <!-- ALERTAS -->
    <div
      id="mensajeExito"
      class="alert alert-success"
      style="display:none;">
    </div>

    <div
      id="mensajeError"
      class="alert alert-danger"
      style="display:none;">
    </div>

    <!-- FORMULARIO -->
    <form
      id="formulario"
      class="row g-3">

      <div class="col-md-6">

        <label class="form-label">
          Nombre
        </label>

        <input
          type="text"
          id="nombre"
          class="form-control bg-secondary text-light border-0"
          required
        >

      </div>

      <div class="col-md-6">

        <label class="form-label">
          Apellido
        </label>

        <input
          type="text"
          id="apellido"
          class="form-control bg-secondary text-light border-0"
          required
        >

      </div>

      <div class="col-md-4">

        <label class="form-label">
          Edad
        </label>

        <input
          type="number"
          id="edad"
          min="1"
          max="18"
          class="form-control bg-secondary text-light border-0"
          required
        >

      </div>

      <div class="col-md-8">

        <label class="form-label">
          Quien lo trajo
        </label>

        <input
          type="text"
          id="responsable"
          class="form-control bg-secondary text-light border-0"
          required
        >

      </div>

      <div class="col-md-6">

        <label class="form-label">
          Tanda
        </label>

        <select
          id="tanda"
          class="form-select bg-secondary text-light border-0"
          required>

          <option value="">
            Seleccionar tanda
          </option>

          <option value="primera">
            Primera
          </option>

          <option value="segunda">
            Segunda
          </option>

        </select>

      </div>

      <div class="col-md-6">

        <label class="form-label">
          Tiene brazalete
        </label>

        <select
          id="brazalete"
          class="form-select bg-secondary text-light border-0"
          required>

          <option value="">
            Seleccionar
          </option>

          <option value="si">
            Si
          </option>

          <option value="no">
            No
          </option>

        </select>

      </div>

      <div class="col-12 d-flex gap-2">

        <button
          type="submit"
          id="btnRegistrar"
          class="btn btn-primary">

          Registrar

        </button>

        <a
          href="consulta.html"
          class="btn btn-outline-light">

          Ver Consultas

        </a>

      </div>

    </form>

  </div>

  <script>

    // =========================
    // CUPOS MAXIMOS
    // =========================
    const CUPOS = {

      primera: 225,
      segunda: 275

    };

    // =========================
    // ANIO ACTUAL
    // =========================
    const anioActual =
      new Date().getFullYear();

    document.getElementById("anioActual")
      .textContent =
      "Anio " + anioActual;

    // =========================
    // PROTEGER PAGINA
    // =========================
    auth.onAuthStateChanged(function(user) {

      if (!user) {

        window.location.href =
          "login.html";
      }
    });

    // =========================
    // VERIFICAR CUPOS
    // =========================
    async function verificarCupos() {

      const estado =
        document.getElementById(
          "estadoCupos"
        );

      let primeraCount = 0;
      let segundaCount = 0;

      const snapshot =
        await db.collection("ninos")
          .where("anio", "==", anioActual)
          .get();

      snapshot.forEach(function(doc) {

        const d = doc.data();

        if (d.tanda === "primera") {

          primeraCount++;
        }

        if (d.tanda === "segunda") {

          segundaCount++;
        }

      });

      const primeraDisponible =
        CUPOS.primera - primeraCount;

      const segundaDisponible =
        CUPOS.segunda - segundaCount;

      estado.innerHTML =

        "<strong>Primera tanda:</strong> " +

        primeraCount +
        "/" +
        CUPOS.primera +

        " (" +

        primeraDisponible +

        " disponibles)" +

        "<br><br>" +

        "<strong>Segunda tanda:</strong> " +

        segundaCount +
        "/" +
        CUPOS.segunda +

        " (" +

        segundaDisponible +

        " disponibles)";

      // CAMBIO DE COLOR
      if (
        primeraCount >= CUPOS.primera ||
        segundaCount >= CUPOS.segunda
      ) {

        estado.className =
          "alert alert-danger";
      }

      else {

        estado.className =
          "alert alert-info";
      }
    }

    // CARGAR AL INICIO
    verificarCupos();

    // =========================
    // FORMULARIO
    // =========================
    document.getElementById("formulario")
      .addEventListener(
        "submit",
        async function(e) {

        e.preventDefault();

        const user =
          auth.currentUser;

        if (!user) {

          window.location.href =
            "login.html";

          return;
        }

        const btn =
          document.getElementById(
            "btnRegistrar"
          );

        const exito =
          document.getElementById(
            "mensajeExito"
          );

        const error =
          document.getElementById(
            "mensajeError"
          );

        btn.disabled = true;

        btn.textContent =
          "Guardando...";

        exito.style.display =
          "none";

        error.style.display =
          "none";

        // =========================
        // DATOS
        // =========================
        const tandaValor =
          document.getElementById("tanda")
            .value;

        const edadValor =
          parseInt(
            document.getElementById("edad")
              .value
              .trim()
          );

        // =========================
        // VALIDAR LIMITE
        // =========================
        const snapshot =
          await db.collection("ninos")
            .where("anio", "==", anioActual)
            .where("tanda", "==", tandaValor)
            .get();

        const cantidadActual =
          snapshot.size;

        const limite =
          CUPOS[tandaValor];

        if (cantidadActual >= limite) {

          error.textContent =

            "La tanda seleccionada ya alcanzo el limite permitido.";

          error.style.display =
            "block";

          btn.disabled = false;

          btn.textContent =
            "Registrar";

          return;
        }

        // =========================
        // CREAR REGISTRO
        // =========================
        const nuevoRegistro = {

          nombre:
            document.getElementById("nombre")
              .value
              .trim(),

          apellido:
            document.getElementById("apellido")
              .value
              .trim(),

          edad: edadValor,

          quienLoTrajo:
            document.getElementById("responsable")
              .value
              .trim(),

          tanda: tandaValor,

          tieneBrazalete:
            document.getElementById("brazalete")
              .value,

          anio: anioActual,

          registradoPor:
            user.email,

          fechaRegistro:
            firebase.firestore.Timestamp.now()
        };

        try {

          await db.collection("ninos")
            .add(nuevoRegistro);

          exito.textContent =

            nuevoRegistro.nombre +
            " " +
            nuevoRegistro.apellido +
            " registrado correctamente.";

          exito.style.display =
            "block";

          e.target.reset();

          // ACTUALIZAR CUPOS
          verificarCupos();
        }

        catch(err) {

          console.error(err);

          error.textContent =
            "Error al guardar registro.";

          error.style.display =
            "block";
        }

        finally {

          btn.disabled = false;

          btn.textContent =
            "Registrar";
        }
      });

  </script>

<script src="imagenes-fondo.js"></script>
</body>
</html>
