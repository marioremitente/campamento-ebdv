```html
<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0">

  <title>Historial de Cambios</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="firebase-init.js"></script>

</head>

<body class="bg-dark text-light p-4">

  <div class="container">

    <!-- TITULO -->
    <h2 class="mb-1">
      Historial de Cambios
    </h2>

    <p class="text-secondary mb-4">
      Registro completo de modificaciones realizadas.
    </p>

    <!-- TABLA -->
    <div class="table-responsive">

      <table
        class="table table-striped table-dark align-middle">

        <thead>

          <tr>

            <th>ID Registro</th>

            <th>Campo</th>

            <th>Antes</th>

            <th>Despues</th>

            <th>Usuario</th>

            <th>Fecha</th>

          </tr>

        </thead>

        <tbody id="contenidoHistorial">

          <tr>

            <td
              colspan="6"
              class="text-center">

              Cargando historial...

            </td>

          </tr>

        </tbody>

      </table>

    </div>

    <!-- BOTON -->
    <a
      href="consulta.html"
      class="btn btn-outline-light mt-4">

      ← Volver

    </a>

  </div>

  <script src="footer.js"></script>

  <script>

    // =========================
    // FORMATEAR VALORES
    // =========================
    function formatearValor(valor) {

      if (valor === true)
        return "Si";

      if (valor === false)
        return "No";

      if (
        valor === undefined ||
        valor === null ||
        valor === ""
      ) {
        return "-";
      }

      return valor;
    }

    // =========================
    // LOGIN
    // =========================
    auth.onAuthStateChanged(function(user) {

      // SI NO ESTA LOGUEADO
      if (!user) {

        window.location.href =
          "login.html";

        return;
      }

      var tabla =
        document.getElementById(
          "contenidoHistorial"
        );

      // =========================
      // CONSULTA FIRESTORE
      // =========================
      db.collection("historial_ediciones")

        .orderBy(
          "editadoEn",
          "desc"
        )

        .get()

        .then(function(snapshot) {

          tabla.innerHTML = "";

          // SI NO HAY DATOS
          if (snapshot.empty) {

            tabla.innerHTML =

              "<tr>" +

                "<td colspan='6' class='text-center text-secondary'>" +

                  "No hay cambios registrados todavia." +

                "</td>" +

              "</tr>";

            return;
          }

          // =========================
          // RECORRER DOCUMENTOS
          // =========================
          snapshot.forEach(function(doc) {

            var d =
              doc.data();

            // FECHA
            var fecha =

              (
                d.editadoEn &&
                d.editadoEn.toDate
              )

              ?

              d.editadoEn
                .toDate()
                .toLocaleString("es-DO")

              :

              "Sin fecha";

            // CREAR FILA
            var fila =
              document.createElement("tr");

            fila.innerHTML =

              "<td>" +

                "<small class='text-secondary'>" +

                  (d.idDocumento || "-") +

                "</small>" +

              "</td>" +

              "<td>" +

                (d.campo || "-") +

              "</td>" +

              "<td class='text-danger'>" +

                formatearValor(d.antes) +

              "</td>" +

              "<td class='text-success'>" +

                formatearValor(d.despues) +

              "</td>" +

              "<td>" +

                "<small>" +

                  (d.editadoPor || "-") +

                "</small>" +

              "</td>" +

              "<td>" +

                "<small>" +

                  fecha +

                "</small>" +

              "</td>";

            tabla.appendChild(fila);

          });

        })

        .catch(function(err) {

          console.error(err);

          tabla.innerHTML =

            "<tr>" +

              "<td colspan='6' class='text-center text-danger'>" +

                "Error al cargar historial." +

              "</td>" +

            "</tr>";

        });

    });

  </script>

</body>
</html>
