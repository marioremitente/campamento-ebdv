<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial de Cambios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body class="bg-dark text-light p-4">
  <div class="container">
    <h2 class="mb-1">Historial de Cambios</h2>
    <p class="text-secondary mb-4">Registro de todas las ediciones realizadas</p>

    <div class="table-responsive">
      <table class="table table-striped table-dark align-middle">
        <thead>
          <tr>
            <th>ID Registro</th>
            <th>Campo</th>
            <th>Antes</th>
            <th>Despues</th>
            <th>Usuario</th>
            <th>Fecha</th>
          </tr>
        </thead>
        <tbody id="contenidoHistorial">
          <tr><td colspan="6" class="text-center">Cargando...</td></tr>
        </tbody>
      </table>
    </div>

    <a href="consulta.html" class="btn btn-outline-light mt-4">&#8592; Volver</a>
  </div>

  <script src="footer.js"></script>

  <script>
    auth.onAuthStateChanged(function(user) {
      if (!user) { window.location.href = "login.html"; return; }

      var tabla = document.getElementById("contenidoHistorial");

      db.collection("historial_ediciones")
        .orderBy("editadoEn", "desc")
        .get()
        .then(function(snapshot) {
          tabla.innerHTML = "";
          if (snapshot.empty) {
            tabla.innerHTML = "<tr><td colspan='6' class='text-center text-secondary'>No hay cambios registrados todavia.</td></tr>";
            return;
          }
          snapshot.forEach(function(doc) {
            var d = doc.data();
            var fecha = (d.editadoEn && d.editadoEn.toDate)
              ? d.editadoEn.toDate().toLocaleString("es-DO")
              : "Sin fecha";
            var fila = document.createElement("tr");
            fila.innerHTML =
              "<td><small class='text-secondary'>" + (d.idDocumento || "-") + "</small></td>" +
              "<td>" + (d.campo || "-") + "</td>" +
              "<td class='text-danger'>" + (d.antes || "-") + "</td>" +
              "<td class='text-success'>" + (d.despues || "-") + "</td>" +
              "<td><small>" + (d.editadoPor || "-") + "</small></td>" +
              "<td><small>" + fecha + "</small></td>";
            tabla.appendChild(fila);
          });
        })
        .catch(function(err) {
          tabla.innerHTML = "<tr><td colspan='6' class='text-center text-danger'>Error al cargar historial.</td></tr>";
          console.error(err);
        });
    });
  </script>

 
</body>
</html>
