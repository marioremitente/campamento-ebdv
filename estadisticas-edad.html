<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body class="bg-dark text-light p-4">
  <div class="container" style="max-width: 700px;">
    <h2 class="mb-1">Estadísticas</h2>
    <p class="text-secondary mb-4">Resumen de registros del campamento</p>

    <div id="cargando" class="text-secondary">Cargando estadísticas...</div>
    <div id="reporte" class="mt-3"></div>

    <a href="consulta.html" class="btn btn-outline-light mt-4">← Volver</a>
  </div>

  <script>
    auth.onAuthStateChanged(function(user) {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      db.collection("niños").get().then(snapshot => {
        document.getElementById("cargando").style.display = "none";

        if (snapshot.empty) {
          document.getElementById("reporte").innerHTML = "<p class='text-secondary'>No hay registros todavía.</p>";
          return;
        }

        const conteoEdad = {};
        const conteoTanda = { Primera: 0, Segunda: 0 };
        const conteoBrazalete = { Sí: 0, No: 0 };
        let total = 0;

        snapshot.forEach(doc => {
          const d = doc.data();
          total++;

          // Por edad
          const edad = d.Edad ?? "Sin edad";
          conteoEdad[edad] = (conteoEdad[edad] || 0) + 1;

          // Por tanda
          if (d.Tanda === "Primera") conteoTanda.Primera++;
          else if (d.Tanda === "Segunda") conteoTanda.Segunda++;

          // Por brazalete
          if (d["Tiene brazalete"] === "Sí") conteoBrazalete.Sí++;
          else conteoBrazalete.No++;
        });

        // Ordenar edades numéricamente
        const edadesOrdenadas = Object.keys(conteoEdad).sort((a, b) => Number(a) - Number(b));

        const contenedor = document.getElementById("reporte");
        contenedor.innerHTML = `
          <div class="row g-3 mb-4">
            <div class="col-md-4">
              <div class="card bg-secondary text-white text-center p-3">
                <h1 class="mb-0">${total}</h1>
                <small>Total de niños</small>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-secondary text-white text-center p-3">
                <h1 class="mb-0">${conteoTanda.Primera}</h1>
                <small>Primera tanda</small>
              </div>
            </div>
            <div class="col-md-4">
              <div class="card bg-secondary text-white text-center p-3">
                <h1 class="mb-0">${conteoTanda.Segunda}</h1>
                <small>Segunda tanda</small>
              </div>
            </div>
          </div>

          <h5>Distribución por Edad</h5>
          <ul class="list-group mb-4">
            ${edadesOrdenadas.map(edad => `
              <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
                ${edad === "Sin edad" ? "Sin edad registrada" : `${edad} año(s)`}
                <span class="badge bg-primary">${conteoEdad[edad]}</span>
              </li>
            `).join("")}
          </ul>

          <h5>Brazalete</h5>
          <ul class="list-group">
            <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
              Con brazalete
              <span class="badge bg-success">${conteoBrazalete.Sí}</span>
            </li>
            <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
              Sin brazalete
              <span class="badge bg-secondary">${conteoBrazalete.No}</span>
            </li>
          </ul>
        `;
      }).catch(err => {
        document.getElementById("cargando").textContent = "Error al cargar estadísticas.";
        console.error(err);
      });
    });
  </script>
</body>
</html>
