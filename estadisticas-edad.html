<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script src="firebase-init.js"></script>
</head>
<body class="bg-dark text-light p-4">
  <div class="container" style="max-width: 700px;">
    <h2 class="mb-1">Estadísticas</h2>
    <p class="text-secondary mb-3">Resumen de registros del campamento</p>

    <!-- ✅ FILTRO POR AÑO -->
    <div class="mb-4">
      <select id="filtroAnio" class="form-select bg-secondary text-light border-0" style="max-width: 200px;">
        <option value="">Todos los años</option>
      </select>
    </div>

    <div id="cargando" class="text-secondary">Cargando estadísticas...</div>
    <div id="reporte" class="mt-3"></div>

    <a href="consulta.html" class="btn btn-outline-light mt-4">← Volver</a>
  </div>

  <script>
    let todosLosDatos = [];

    auth.onAuthStateChanged(function(user) {
      if (!user) { window.location.href = "login.html"; return; }

      db.collection("niños").get().then(snapshot => {
        document.getElementById("cargando").style.display = "none";

        if (snapshot.empty) {
          document.getElementById("reporte").innerHTML = "<p class='text-secondary'>No hay registros todavía.</p>";
          return;
        }

        // Guardar todos los datos
        todosLosDatos = [];
        snapshot.forEach(doc => todosLosDatos.push(doc.data()));

        // Cargar años disponibles
        const años = [...new Set(todosLosDatos.map(d => d.Año).filter(Boolean))].sort((a, b) => b - a);
        const select = document.getElementById("filtroAnio");
        años.forEach(anio => {
          const opt = document.createElement("option");
          opt.value = anio;
          opt.textContent = anio;
          select.appendChild(opt);
        });

        // Preseleccionar año actual si existe
        const anioActual = new Date().getFullYear();
        if (años.includes(anioActual)) select.value = anioActual;

        mostrarEstadisticas(select.value);

        select.addEventListener("change", () => mostrarEstadisticas(select.value));

      }).catch(err => {
        document.getElementById("cargando").textContent = "Error al cargar estadísticas.";
        console.error(err);
      });
    });

    function mostrarEstadisticas(anioFiltro) {
      const datos = anioFiltro
        ? todosLosDatos.filter(d => String(d.Año) === String(anioFiltro))
        : todosLosDatos;

      const conteoEdad = {};
      const conteoTanda = { Primera: 0, Segunda: 0 };
      const conteoBrazalete = { Sí: 0, No: 0 };
      const total = datos.length;

      datos.forEach(d => {
        const edad = d.Edad ?? "Sin edad";
        conteoEdad[edad] = (conteoEdad[edad] || 0) + 1;

        if (d.Tanda === "Primera") conteoTanda.Primera++;
        else if (d.Tanda === "Segunda") conteoTanda.Segunda++;

        if (d["Tiene brazalete"] === "Sí") conteoBrazalete.Sí++;
        else conteoBrazalete.No++;
      });

      const edadesOrdenadas = Object.keys(conteoEdad).sort((a, b) => Number(a) - Number(b));

      const titulo = anioFiltro ? `Campamento ${anioFiltro}` : "Todos los campamentos";

      document.getElementById("reporte").innerHTML = `
        <h5 class="text-info mb-3">${titulo}</h5>

        <div class="row g-3 mb-4">
          <div class="col-md-4">
            <div class="card bg-secondary text-white text-center p-3">
              <h1 class="mb-0">${total}</h1>
              <small>Total de niños</small>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-secondary text-white text-center p-3">
              <h1 class="mb-0">${conteoTanda.Primera}</h1>
              <small>Primera tanda</small>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card bg-secondary text-white text-center p-3">
              <h1 class="mb-0">${conteoTanda.Segunda}</h1>
              <small>Segunda tanda</small>
            </div>
          </div>
        </div>

        <h5>Distribución por Edad</h5>
        <ul class="list-group mb-4">
          ${edadesOrdenadas.map(edad => `
            <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
              ${edad === "Sin edad" ? "Sin edad registrada" : `${edad} año(s)`}
              <span class="badge bg-primary">${conteoEdad[edad]}</span>
            </li>
          `).join("")}
        </ul>

        <h5>Brazalete</h5>
        <ul class="list-group">
          <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
            Con brazalete
            <span class="badge bg-success">${conteoBrazalete.Sí}</span>
          </li>
          <li class="list-group-item bg-dark text-white d-flex justify-content-between align-items-center">
            Sin brazalete
            <span class="badge bg-secondary">${conteoBrazalete.No}</span>
          </li>
        </ul>
      `;
    }
  </script>
</body>
</html>
